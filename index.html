<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Street Fighter - iPhone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            touch-action: none; 
            font-family: Arial, sans-serif;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        
        #ui-layer { 
            position: absolute; 
            top: 10px; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 20px; 
            z-index: 100;
        }
        .health-container { 
            width: 40%; 
            background: #333; 
            border: 3px solid #fff; 
            border-radius: 5px;
            overflow: hidden;
        }
        .health-fill { 
            height: 25px; 
            width: 100%; 
            transition: width 0.3s; 
        }
        #p1-health { background: linear-gradient(90deg, #ff4444, #ff0000); }
        #cpu-health { background: linear-gradient(90deg, #44ff44, #00ff00); }
        
        .player-name {
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px #000;
        }
        
        #timer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 3px 3px 6px #000;
            z-index: 100;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
        }
        
        .control-group { display: flex; gap: 10px; }
        
        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #fff;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        .btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.4); }
        .btn-attack { background: rgba(255, 0, 0, 0.6); }
        .btn-jump { background: rgba(0, 255, 0, 0.6); }
        .btn-special { background: rgba(255, 255, 0, 0.6); }
        
        #result-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 4px 4px 8px #000;
            display: none;
            z-index: 200;
            text-align: center;
        }
        
        #restart-btn {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            font-size: 18px;
            background: #ff0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: none;
            z-index: 200;
            font-weight: bold;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div>
                <div class="player-name">👤 JUGADOR</div>
                <div class="health-container">
                    <div id="p1-health" class="health-fill"></div>
                </div>
            </div>
            <div>
                <div class="player-name" style="text-align: right;">🤖 CPU</div>
                <div class="health-container">
                    <div id="cpu-health" class="health-fill"></div>
                </div>
            </div>
        </div>
        
        <div id="timer">99</div>
        <div id="result-message"></div>
        <button id="restart-btn" onclick="restartGame()">Jugar de Nuevo</button>
        
        <div id="controls">
            <div class="control-group">
                <div class="btn" id="btn-left">◀</div>
                <div class="btn" id="btn-right">▶</div>
                <div class="btn btn-jump" id="btn-jump">▲</div>
            </div>
            <div class="control-group">
                <div class="btn btn-attack" id="btn-attack">👊</div>
                <div class="btn btn-special" id="btn-special">⚡</div>
            </div>
        </div>
    </div>

    <script>
        let game, player, cpu, p1Health = 100, cpuHealth = 100, gameOver = false, timer = 99, timerInterval;

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: window.innerWidth,
            height: window.innerHeight - 150,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 800 }, debug: false }
            },
            scene: { preload, create, update }
        };

        function initGame() {
            if (game) game.destroy(true);
            clearInterval(timerInterval);
            game = new Phaser.Game(config);
        }

        function preload() {
            // Usar imágenes individuales en lugar de sprite sheets
            this.load.image('player', 'player.PNG');
            this.load.image('enemy', 'enemy.PNG');
            this.load.image('bg', 'background.PNG');
        }

        function create() {
            // Fondo - ajustar al tamaño de pantalla
            this.add.image(window.innerWidth/2, window.innerHeight/2, 'bg')
                .setDisplaySize(window.innerWidth, window.innerHeight - 150);
            
            // Suelo
            const ground = this.add.rectangle(window.innerWidth/2, window.innerHeight - 100, window.innerWidth, 50, 0x222222);
            this.physics.add.existing(ground, true);
            
            // JUGADOR - más pequeño para que quepa
            player = this.add.sprite(100, window.innerHeight - 200, 'player');
            player.setScale(0.3); // Mucho más pequeño
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            player.body.setSize(50, 100);
            
            // CPU
            cpu = this.add.sprite(window.innerWidth - 100, window.innerHeight - 200, 'enemy');
            cpu.setScale(0.3);
            cpu.setFlipX(true);
            this.physics.add.existing(cpu);
            cpu.body.setCollideWorldBounds(true);
            cpu.body.setSize(50, 100);
            
            // Colisiones
            this.physics.add.collider(player, ground);
            this.physics.add.collider(cpu, ground);
            
            // Reset
            p1Health = 100;
            cpuHealth = 100;
            gameOver = false;
            timer = 99;
            updateHealthBars();
            updateTimer();
            document.getElementById('result-message').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none';
            
            // Timer
            timerInterval = setInterval(() => {
                if (!gameOver && timer > 0) {
                    timer--;
                    updateTimer();
                    if (timer === 0) endGameByTime();
                }
            }, 1000);
            
            setupTouchControls(this);
            
            // FIGHT text
            this.add.text(window.innerWidth/2, window.innerHeight/3, '¡FIGHT!', { 
                fontSize: '50px', fill: '#ff0', stroke: '#000', strokeThickness: 6 
            }).setOrigin(0.5);
            
            this.cpuAI = { moveLeft: false, moveRight: false, reactionTime: 700, lastDecision: 0 };
        }

        function setupTouchControls(scene) {
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');
            const btnAttack = document.getElementById('btn-attack');
            const btnSpecial = document.getElementById('btn-special');
            
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); scene.p1MoveLeft = true; });
            btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); scene.p1MoveLeft = false; });
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); scene.p1MoveRight = true; });
            btnRight.addEventListener('touchend', (e) => { e.preventDefault(); scene.p1MoveRight = false; });
            btnJump.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (player.body.touching.down) player.body.setVelocityY(-400);
            });
            btnAttack.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (!gameOver) performAttack(player, cpu, 'cpu', scene);
            });
            btnSpecial.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (!gameOver) performSpecial(player, cpu, 'cpu', scene);
            });
        }

        function performAttack(attacker, defender, defenderType, scene) {
            const distance = Phaser.Math.Distance.Between(attacker.x, attacker.y, defender.x, defender.y);
            if (distance < 100) {
                if (defenderType === 'cpu') {
                    cpuHealth -= 10;
                    defender.body.setVelocityX(attacker.x < defender.x ? 80 : -80);
                } else {
                    p1Health -= 10;
                    defender.body.setVelocityX(attacker.x < defender.x ? 80 : -80);
                }
                updateHealthBars();
                checkKO();
            }
        }

        function performSpecial(attacker, defender, defenderType, scene) {
            const distance = Phaser.Math.Distance.Between(attacker.x, attacker.y, defender.x, defender.y);
            if (distance < 150) {
                if (defenderType === 'cpu') {
                    cpuHealth -= 25;
                    defender.body.setVelocityX(attacker.x < defender.x ? 150 : -150);
                } else {
                    p1Health -= 25;
                    defender.body.setVelocityX(attacker.x < defender.x ? 150 : -150);
                }
                updateHealthBars();
                checkKO();
            }
        }

        function updateHealthBars() {
            document.getElementById('p1-health').style.width = Math.max(0, p1Health) + '%';
            document.getElementById('cpu-health').style.width = Math.max(0, cpuHealth) + '%';
        }

        function updateTimer() {
            document.getElementById('timer').innerText = timer;
            document.getElementById('timer').style.color = timer <= 10 ? '#f00' : '#ff0';
        }

        function checkKO() {
            if (p1Health <= 0 || cpuHealth <= 0) {
                gameOver = true;
                clearInterval(timerInterval);
                const resultMsg = document.getElementById('result-message');
                resultMsg.style.display = 'block';
                document.getElementById('restart-btn').style.display = 'block';
                resultMsg.innerText = p1Health <= 0 ? '¡PERDISTE!' : '¡GANASTE!';
                resultMsg.style.color = p1Health <= 0 ? '#f00' : '#0f0';
            }
        }

        function endGameByTime() {
            gameOver = true;
            clearInterval(timerInterval);
            const resultMsg = document.getElementById('result-message');
            resultMsg.style.display = 'block';
            document.getElementById('restart-btn').style.display = 'block';
            resultMsg.innerText = p1Health > cpuHealth ? '¡GANASTE!' : '¡PERDISTE!';
        }

        function updateAI(scene) {
            if (gameOver) return;
            const now = Date.now();
            if (now - this.cpuAI.lastDecision > this.cpuAI.reactionTime) {
                this.cpuAI.lastDecision = now;
                const distance = Phaser.Math.Distance.Between(player.x, player.y, cpu.x, cpu.y);
                const random = Math.random();
                
                if (distance > 120) {
                    if (player.x < cpu.x) {
                        this.cpuAI.moveLeft = true;
                        this.cpuAI.moveRight = false;
                        cpu.setFlipX(false);
                    } else {
                        this.cpuAI.moveLeft = false;
                        this.cpuAI.moveRight = true;
                        cpu.setFlipX(true);
                    }
                } else {
                    if (random < 0.4) performAttack(cpu, player, 'player', scene);
                    else if (random < 0.6 && cpu.body.touching.down) cpu.body.setVelocityY(-350);
                    else { this.cpuAI.moveLeft = false; this.cpuAI.moveRight = false; }
                }
            }
            cpu.body.setVelocityX(0);
            if (this.cpuAI.moveLeft) cpu.body.setVelocityX(-100);
            else if (this.cpuAI.moveRight) cpu.body.setVelocityX(100);
        }

        function update() {
            if (gameOver) return;
            player.body.setVelocityX(0);
            if (this.p1MoveLeft) {
                player.body.setVelocityX(-150);
                player.setFlipX(true);
            } else if (this.p1MoveRight) {
                player.body.setVelocityX(150);
                player.setFlipX(false);
            }
            updateAI.call(this);
        }

        function restartGame() { initGame(); }

        initGame();

        window.addEventListener('resize', () => {
            if (game) game.scale.resize(window.innerWidth, window.innerHeight - 150);
        });
    </script>
</body>
</html>
